<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5cc6c6"/>
      <stop offset="100%" stop-color="#1e5fbf"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="56" y="56" width="400" height="400" rx="60" fill="url(#grad)"/>

  <!-- Text AR -->
  <text x="50%" y="58%"
        text-anchor="middle"
        font-size="180"
        font-family="serif"
        fill="#ffffff"
        dominant-baseline="middle">
    AR
  </text>

</svg>